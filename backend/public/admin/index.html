<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Truth Stamp Admin</title>
  <style>
    :root {
      --bg: #f3f6fb;
      --card: rgba(255, 255, 255, 0.78);
      --text: #0f172a;
      --muted: #64748b;
      --accent: #2563eb;
      --danger: #dc2626;
      --ok: #16a34a;
      --border: rgba(255, 255, 255, 0.8);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC",
        "Helvetica Neue", "Segoe UI", sans-serif;
      color: var(--text);
      background: linear-gradient(160deg, #eef3ff, #f8fbff 45%, #edf7ff);
      min-height: 100vh;
    }
    .wrap {
      width: min(1100px, 92vw);
      margin: 28px auto;
    }
    .glass {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 28px;
      box-shadow: 0 14px 40px rgba(17, 24, 39, 0.12);
      backdrop-filter: blur(18px);
    }
    .title-card {
      padding: 22px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }
    .title-card h1 {
      margin: 0;
      font-size: 24px;
      font-weight: 800;
    }
    .title-card p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
      font-weight: 600;
    }
    .chip {
      background: #ffffff;
      border: 1px solid #dbeafe;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 700;
      color: #1d4ed8;
    }
    .login-panel {
      max-width: 480px;
      margin: 10vh auto 0;
      padding: 24px;
    }
    .field {
      margin: 12px 0;
    }
    .label {
      display: block;
      margin-bottom: 8px;
      font-size: 13px;
      font-weight: 700;
      color: #334155;
    }
    .input {
      width: 100%;
      border: none;
      outline: none;
      border-radius: 16px;
      padding: 14px 14px;
      background: #f1f5f9;
      font-size: 15px;
      font-weight: 600;
    }
    .btn {
      border: none;
      outline: none;
      cursor: pointer;
      border-radius: 16px;
      padding: 13px 18px;
      font-size: 14px;
      font-weight: 800;
      transition: transform .16s ease, opacity .16s ease;
    }
    .btn:active { transform: translateY(1px); }
    .btn-primary {
      width: 100%;
      color: #fff;
      background: linear-gradient(90deg, #3b82f6, #2563eb);
      box-shadow: 0 10px 20px rgba(37, 99, 235, 0.26);
    }
    .btn-danger {
      color: #fff;
      background: linear-gradient(90deg, #ef4444, #dc2626);
    }
    .toolbar {
      padding: 16px 18px 4px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }
    .toolbar .left {
      color: #334155;
      font-weight: 700;
      font-size: 14px;
    }
    .table-wrap {
      padding: 12px 16px 18px;
      overflow: auto;
    }
    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0 10px;
      min-width: 780px;
    }
    th {
      text-align: left;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .04em;
      color: #64748b;
      padding: 0 12px;
    }
    td {
      background: #fff;
      padding: 12px;
      font-size: 14px;
      font-weight: 600;
    }
    tr td:first-child { border-radius: 14px 0 0 14px; }
    tr td:last-child { border-radius: 0 14px 14px 0; }
    .muted { color: #64748b; font-weight: 600; }
    .status {
      margin-top: 10px;
      font-size: 13px;
      font-weight: 700;
      min-height: 18px;
    }
    .ok { color: var(--ok); }
    .err { color: var(--danger); }
    .hidden { display: none !important; }
    .select {
      border: none;
      border-radius: 12px;
      padding: 9px 10px;
      font-weight: 700;
      background: #eff6ff;
      color: #1e3a8a;
      outline: none;
    }
    .inline-btn {
      border: none;
      border-radius: 12px;
      padding: 8px 10px;
      cursor: pointer;
      background: #dbeafe;
      color: #1d4ed8;
      font-weight: 800;
      margin-left: 8px;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section id="loginPanel" class="glass login-panel">
      <h2 style="margin:0 0 4px;font-size:24px;">管理员登录</h2>
      <p class="muted" style="margin:0 0 12px;">truthstamp.cn/admin</p>
      <div class="field">
        <label class="label" for="adminPassword">管理员密码</label>
        <input id="adminPassword" class="input" type="password" autocomplete="current-password" />
      </div>
      <button id="loginBtn" class="btn btn-primary">安全登录</button>
      <div id="loginStatus" class="status"></div>
    </section>

    <section id="dashboard" class="hidden">
      <div class="glass title-card">
        <div>
          <h1>Truth Stamp 管理控制台</h1>
          <p>管理用户等级（Free / Pro / Plus / Enterprise / Founder）</p>
        </div>
        <span class="chip">/admin</span>
      </div>
      <div class="glass">
        <div class="toolbar">
          <div class="left">注册用户列表</div>
          <button id="refreshBtn" class="btn" style="background:#e2e8f0;color:#0f172a;">刷新</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>手机号</th>
                <th>注册时间</th>
                <th>当前等级</th>
                <th style="width:220px;">操作</th>
              </tr>
            </thead>
            <tbody id="usersBody"></tbody>
          </table>
          <div id="dashboardStatus" class="status"></div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const state = {
      token: '',
      roleOptions: ['Free', 'Pro', 'Plus', 'Enterprise', 'Founder'],
      users: [],
    };

    const loginPanel = document.getElementById('loginPanel');
    const dashboard = document.getElementById('dashboard');
    const adminPasswordInput = document.getElementById('adminPassword');
    const loginBtn = document.getElementById('loginBtn');
    const loginStatus = document.getElementById('loginStatus');
    const refreshBtn = document.getElementById('refreshBtn');
    const usersBody = document.getElementById('usersBody');
    const dashboardStatus = document.getElementById('dashboardStatus');

    function setStatus(el, message, type = '') {
      el.textContent = message || '';
      el.className = `status ${type}`.trim();
    }

    function formatDate(input) {
      if (!input) return '-';
      const date = new Date(input);
      if (Number.isNaN(date.getTime())) return input;
      return date.toLocaleString('zh-CN', { hour12: false });
    }

    function maskPhone(input) {
      if (!input || input.length < 7) return input || '-';
      return `${input.slice(0, 3)}****${input.slice(-4)}`;
    }

    async function apiFetch(path, options = {}) {
      const headers = Object.assign(
        { 'Content-Type': 'application/json' },
        options.headers || {}
      );
      if (state.token) {
        headers.Authorization = `Bearer ${state.token}`;
      }
      const response = await fetch(path, Object.assign({}, options, { headers }));
      const data = await response.json().catch(() => ({}));
      if (!response.ok || data.ok === false) {
        throw new Error(data.error || `请求失败 (${response.status})`);
      }
      return data;
    }

    function renderUsers() {
      usersBody.innerHTML = '';
      if (!state.users.length) {
        usersBody.innerHTML = `<tr><td colspan="4" class="muted">暂无用户数据</td></tr>`;
        return;
      }
      for (const user of state.users) {
        const tr = document.createElement('tr');
        const options = state.roleOptions
          .map((role) => `<option value="${role}" ${role === user.role ? 'selected' : ''}>${role}</option>`)
          .join('');
        tr.innerHTML = `
          <td>${maskPhone(user.phoneNumber)}</td>
          <td>${formatDate(user.registeredAt)}</td>
          <td>${user.role || 'Free'}</td>
          <td>
            <select class="select" data-user-id="${user.userId}">${options}</select>
            <button class="inline-btn" data-action="save" data-user-id="${user.userId}">升级/修改</button>
          </td>
        `;
        usersBody.appendChild(tr);
      }
    }

    async function loadUsers() {
      setStatus(dashboardStatus, '正在拉取用户数据...');
      try {
        const data = await apiFetch('/api/admin/users');
        state.users = data.users || [];
        if (Array.isArray(data.roleOptions) && data.roleOptions.length) {
          state.roleOptions = data.roleOptions;
        }
        renderUsers();
        setStatus(dashboardStatus, `已加载 ${state.users.length} 位用户`, 'ok');
      } catch (error) {
        setStatus(dashboardStatus, error.message, 'err');
      }
    }

    async function login() {
      const adminPassword = adminPasswordInput.value.trim();
      if (!adminPassword) {
        setStatus(loginStatus, '请输入管理员密码', 'err');
        return;
      }
      loginBtn.disabled = true;
      setStatus(loginStatus, '正在验证身份...');
      try {
        const data = await apiFetch('/api/admin/users', {
          method: 'POST',
          body: JSON.stringify({ action: 'login', adminPassword }),
        });
        state.token = data.token;
        if (Array.isArray(data.roleOptions) && data.roleOptions.length) {
          state.roleOptions = data.roleOptions;
        }
        loginPanel.classList.add('hidden');
        dashboard.classList.remove('hidden');
        await loadUsers();
      } catch (error) {
        setStatus(loginStatus, error.message, 'err');
      } finally {
        loginBtn.disabled = false;
      }
    }

    async function saveRole(userId) {
      const select = usersBody.querySelector(`select[data-user-id="${userId}"]`);
      if (!select) return;
      const role = select.value;
      try {
        await apiFetch('/api/admin/users', {
          method: 'POST',
          body: JSON.stringify({
            action: 'updateRole',
            userId,
            role,
          }),
        });
        const target = state.users.find((item) => item.userId === userId);
        if (target) target.role = role;
        renderUsers();
        setStatus(dashboardStatus, `用户等级已更新为 ${role}`, 'ok');
      } catch (error) {
        setStatus(dashboardStatus, error.message, 'err');
      }
    }

    loginBtn.addEventListener('click', login);
    adminPasswordInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') login();
    });
    refreshBtn.addEventListener('click', loadUsers);

    usersBody.addEventListener('click', (event) => {
      const target = event.target;
      if (!(target instanceof HTMLElement)) return;
      if (target.dataset.action === 'save' && target.dataset.userId) {
        saveRole(target.dataset.userId);
      }
    });
  </script>
</body>
</html>
